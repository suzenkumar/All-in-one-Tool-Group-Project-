<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Notes(All In One Tool)</title>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
 <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">
  <div class="header-left">
   
    <span class="header-eyebrow">✦ My Journal</span>
     <h1>All In One</h1>
    <h1>Notes</h1>
    <p class="header-sub">Write it down, keep it close.</p>
  </div>
  <button class="btn-create" id="createBtn">
    <span class="icon">+</span>
    New Note
  </button>
</div>

<hr class="divider"/>

<div class="notes-container" id="notesContainer">
  <div class="empty-state" id="emptyState">
    <div class="empty-icon">📝</div>
    <p>Your notes will appear here.</p>
    <span>Click "New Note" to get started</span>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
